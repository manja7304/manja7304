  <text x="247" y="118" text-anchor="middle" fill="url(#fireGrad)" font-size="28">=%</text>
  <text x="247" y="142" text-anchor="middle" fill="#38bdae" font-family="'Segoe UI', Ubuntu, monospace" font-size="28" font-weight="700">47</text>

  <!-- Longest Streak -->
