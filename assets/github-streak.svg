  <text x="412" y="125" text-anchor="middle" fill="#38bdae" font-family="'Segoe UI', Ubuntu, monospace" font-size="36" font-weight="700">63</text>

  <text x="247" y="178" text-anchor="middle" fill="#484f58" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11">manja7304 · Public + Private</text>
