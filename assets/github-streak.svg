<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-label="GitHub Streak Stats">
  <defs>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FF2D95"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
  </defs>
  <rect width="495" height="195" rx="4.5" fill="#0D1117"/>
  <rect x="0.5" y="0.5" width="494" height="194" rx="4" fill="none" stroke="#30363d" stroke-opacity="0.45"/>

  <text x="247" y="28" text-anchor="middle" fill="#70a5fd" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="16" font-weight="700">GitHub Streak</text>

  <!-- Total Contributions -->
  <text x="82" y="58" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="12">Total Contributions</text>
  <rect x="22" y="68" width="120" height="90" rx="6" fill="#1a1b27" stroke="#30363d"/>
  <text x="82" y="125" text-anchor="middle" fill="#38bdae" font-family="'Segoe UI', Ubuntu, monospace" font-size="36" font-weight="700">847</text>

  <!-- Current Streak -->
